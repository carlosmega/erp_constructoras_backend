[pytest]
DJANGO_SETTINGS_MODULE = crm.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
testpaths = apps core

addopts =
    --reuse-db
    --no-migrations
    --verbose
    --strict-markers
    --tb=short
    --cov=apps
    --cov=core
    --cov-report=html
    --cov-report=term-missing:skip-covered
    --cov-fail-under=80
    -p no:warnings

markers =
    unit: Unit tests
    integration: Integration tests
    contract: Contract/API tests
    slow: Slow-running tests
    permissions: RBAC permission tests
    workflow: Business workflow tests (e.g., lead qualification)
    smoke: Quick sanity checks
