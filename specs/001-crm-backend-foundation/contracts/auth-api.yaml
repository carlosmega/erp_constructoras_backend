openapi: 3.0.3
info:
  title: CRM Authentication API
  description: Authentication and session management endpoints for CRM backend
  version: 1.0.0
  contact:
    name: CRM Backend Team

servers:
  - url: http://localhost:8000/api
    description: Development server
  - url: https://api.crm.example.com/api
    description: Production server

tags:
  - name: Authentication
    description: User authentication and session management

paths:
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Authenticate user
      description: |
        Authenticates a user with email and password. On successful authentication:
        - Creates a session (30-minute timeout)
        - Sets session cookie
        - Updates lastlogindate
        - Resets failedloginattempts to 0

        On failed authentication:
        - Increments failedloginattempts
        - Locks account after 3 consecutive failures
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '200':
          description: Authentication successful
          headers:
            Set-Cookie:
              description: Session cookie (httpOnly, secure in production)
              schema:
                type: string
                example: sessionid=abc123; Path=/; HttpOnly; SameSite=Lax
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: VALIDATION_ERROR
                message: Email and password are required
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_credentials:
                  summary: Invalid email or password
                  value:
                    error: INVALID_CREDENTIALS
                    message: Invalid email or password
                account_locked:
                  summary: Account locked due to failed attempts
                  value:
                    error: ACCOUNT_LOCKED
                    message: Account has been locked due to multiple failed login attempts. Contact administrator.
                account_disabled:
                  summary: Account is disabled
                  value:
                    error: ACCOUNT_DISABLED
                    message: This account has been disabled. Contact administrator.

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: End user session
      description: Logs out the current user by destroying the session
      operationId: logout
      security:
        - SessionAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: No active session found

  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user
      description: Returns the currently authenticated user's information
      operationId: getCurrentUser
      security:
        - SessionAuth: []
      responses:
        '200':
          description: Current user information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: UNAUTHORIZED
                message: Authentication required

  /auth/change-password:
    post:
      tags:
        - Authentication
      summary: Change password
      description: Allows authenticated user to change their own password
      operationId: changePassword
      security:
        - SessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordDto'
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password changed successfully
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                incorrect_current:
                  summary: Current password incorrect
                  value:
                    error: INVALID_PASSWORD
                    message: Current password is incorrect
                weak_password:
                  summary: New password doesn't meet requirements
                  value:
                    error: WEAK_PASSWORD
                    message: Password must be at least 8 characters with mix of character types
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    LoginDto:
      type: object
      description: Login credentials
      required:
        - emailaddress1
        - password
      properties:
        emailaddress1:
          type: string
          format: email
          description: User's email address
          example: john.doe@example.com
        password:
          type: string
          format: password
          description: User's password
          example: SecureP@ssw0rd

    LoginResponse:
      type: object
      description: Successful login response
      required:
        - user
        - message
      properties:
        message:
          type: string
          example: Login successful
        user:
          $ref: '#/components/schemas/UserInfo'

    UserInfo:
      type: object
      description: Basic user information (excludes sensitive fields)
      required:
        - systemuserid
        - emailaddress1
        - fullname
        - role_name
      properties:
        systemuserid:
          type: string
          format: uuid
          description: User's unique identifier
        emailaddress1:
          type: string
          format: email
          description: User's email address
        fullname:
          type: string
          description: User's full display name
        role_name:
          type: string
          description: User's assigned security role
          enum:
            - System Administrator
            - Sales Manager
            - Salesperson
            - Marketing User
            - Read-Only User
        lastlogindate:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of last login

    ChangePasswordDto:
      type: object
      description: Password change payload
      required:
        - current_password
        - new_password
      properties:
        current_password:
          type: string
          format: password
          description: User's current password (for verification)
        new_password:
          type: string
          format: password
          description: New password (min 8 characters, complexity requirements)
          minLength: 8

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error code
          enum:
            - VALIDATION_ERROR
            - INVALID_CREDENTIALS
            - ACCOUNT_LOCKED
            - ACCOUNT_DISABLED
            - UNAUTHORIZED
            - INVALID_PASSWORD
            - WEAK_PASSWORD
        message:
          type: string
          description: Human-readable error message
        details:
          type: object
          description: Additional error details

  securitySchemes:
    SessionAuth:
      type: apiKey
      in: cookie
      name: sessionid
      description: |
        Django session-based authentication.

        Session details:
        - Timeout: 30 minutes of inactivity
        - HttpOnly cookie (not accessible via JavaScript)
        - Secure flag in production (HTTPS only)
        - SameSite=Lax for CSRF protection

        Authentication flow:
        1. POST /api/auth/login with credentials
        2. Receive sessionid cookie in Set-Cookie header
        3. Browser automatically sends cookie with subsequent requests
        4. Session expires after 30 minutes of inactivity
        5. POST /api/auth/logout to explicitly end session

security:
  - SessionAuth: []
